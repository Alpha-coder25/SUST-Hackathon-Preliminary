# =============================================================================
# QueueStorm Investigator — Grafana Datasource Provisioning
# =============================================================================
# Automatically registers Prometheus as a datasource in Grafana
# so dashboards can query metrics immediately.
# =============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    uid: queuestorm-prom
    jsonData:
      timeInterval: "15s"
      queryTimeout: "30s"
      httpMethod: "POST"
